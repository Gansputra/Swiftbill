<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradasi Linier Ungu ke Biru -->
    <linearGradient id="purpleBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D5CFF"/>
      <stop offset="100%" stop-color="#4D86FF"/>
    </linearGradient>
  </defs>

  <!-- Latar Belakang Kotak Membulat (Squircle) -->
  <rect x="5" y="5" width="90" height="90" rx="28" fill="url(#purpleBlueGrad)"/>
  
  <!-- Huruf S Putih (Tebal dan di tengah) -->
  <text x="50" y="64" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="44" 
        font-weight="900" 
        fill="#FFFFFF" 
        text-anchor="middle">S</text>
</svg>
